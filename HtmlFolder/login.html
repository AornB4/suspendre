<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SUSPENDRE</title>
  <link rel="stylesheet" href="../cssFolder/styles.css" />
  <link rel="stylesheet" href="../cssFolder/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap"
    rel="stylesheet">
</head>

<body class="auth-body">
  <nav class="navbar" id="navbar">
    <div class="nav-logo"><a href="index.html">SUSPENDRE</a></div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li id="navCartItem" style="display:none"><a href="cart.html">Cart <span class="cart-count"
            id="cartCount">0</span></a></li>
      <li id="navLoginItem"><a href="login.html" class="active">Login</a></li>
      <li id="navSignupItem"><a href="signup.html" class="btn-nav">Sign Up</a></li>
      <li id="navLogoutItem" style="display:none"><a href="#" id="logoutBtn">Logout</a></li>
      <li id="navAdminItem" style="display:none"><a href="admin.html">Admin</a></li>
    </ul>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">SUSPENDRE</div>
      <h1 class="auth-title">Welcome back.</h1>
      <p class="auth-sub">Sign in to your account to continue.</p>

      <div class="alert" id="authAlert" style="display:none"></div>

      <div class="auth-form" id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pw" id="togglePw">Show</button>
          </div>
        </div>
        <button class="btn-primary full-width" id="loginBtn">Sign In</button>
      </div>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>

      <div class="auth-divider"><span>or try demo</span></div>
      <div class="demo-accounts">
        <button class="btn-demo" onclick="fillDemo('user')">Demo User</button>
        <button class="btn-demo" onclick="fillDemo('admin')">Demo Admin</button>
      </div>
    </div>
    <div class="auth-visual">
      <div class="auth-visual-inner">
        <div class="hanger-art">
          <div class="hanger-hook"></div>
          <div class="hanger-bar"></div>
          <div class="hanger-left"></div>
          <div class="hanger-right"></div>
        </div>
        <p>"A luxury hanger is the first<br />act of dressing well."</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="../JsFolder/data.js"></script>
  <script src="../JsFolder/auth.js"></script>
  <script src="../JsFolder/app.js"></script>
  <script src="../JsFolder/login.js"></script>
</body>

</html>
